name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required project files
        run: |
          set -e
          required_files=(
            "README.md"
            "requirements.txt"
            "docker-compose.yml"
            "src/config.py"
            "src/extract.py"
            "src/transform.py"
            "src/quality.py"
            "src/load.py"
            "src/pipeline.py"
            "tests/test_transform.py"
            "tests/test_quality.py"
            "sql/01_create_schema.sql"
            "sql/02_create_tables.sql"
            "sql/03_insert_dimensions.sql"
            "sql/04_analytics_queries.sql"
            "sql/05_data_quality_checks.sql"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done
          echo "All required files are present."

      - name: Run basic lint (if configured)
        run: |
          set -e
          if [ -f "ruff.toml" ] || [ -f ".ruff.toml" ] || grep -q "^\[tool\.ruff\]" pyproject.toml; then
            echo "Ruff configuration found. Running ruff check..."
            python -m pip install ruff
            ruff check src tests
          elif [ -f ".flake8" ] || [ -f "tox.ini" ] || [ -f "setup.cfg" ] || grep -q "^\[tool\.flake8\]" pyproject.toml; then
            echo "Flake8 configuration found. Running flake8..."
            python -m pip install flake8
            flake8 src tests
          else
            echo "No lint configuration found. Skipping lint step."
          fi

      - name: Run tests
        run: pytest
